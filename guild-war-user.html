<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild War Registration</title>
    <link rel="stylesheet" href="styles-fixed.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="gw-header-actions">
                <button type="button" class="btn-secondary gw-theme-toggle" id="gwThemeToggleBtn" aria-pressed="false">Dark Mode</button>
            </div>
            <h1>Guild War Registration</h1>
            <p class="subtitle">Members: login with Discord and submit your registration</p>
        </header>

        <div class="guild-war-panel" id="tab-guild-war" role="main">
            <div class="guild-war-header">
                <h2>Guild War Member Form</h2>
                <p>Submit your availability and role for the next Guild War.</p>
            </div>

            <section class="guild-card guild-member-card">
                <h3>Discord Login</h3>
                <p class="guild-note">Login is required before submitting the registration form.</p>
                <div class="gw-auth-row" id="gwAuthRow">
                    <div id="gwAuthIdentity" class="gw-auth-identity">Not signed in</div>
                    <div class="gw-auth-actions">
                        <button type="button" class="btn-primary" id="gwDiscordLoginBtn">Login with Discord</button>
                        <button type="button" class="btn-secondary" id="gwDiscordLogoutBtn">Logout</button>
                    </div>
                </div>
            </section>

            <section class="guild-card guild-member-card">
                <h3>Member Registration Form</h3>
                <form id="gwRegistrationForm" class="guild-form-grid">
                    <div class="form-group">
                        <label for="gwDiscordName">Discord</label>
                        <input type="text" id="gwDiscordName" readonly placeholder="Login first">
                    </div>
                    <div class="form-group">
                        <label for="gwCharacterName">Character Name</label>
                        <input type="text" id="gwCharacterName" required maxlength="64" placeholder="In-game name">
                    </div>
                    <div class="form-group">
                        <label for="gwRole">Role</label>
                        <select id="gwRole" required>
                            <option value="Tank">Tank</option>
                            <option value="Healer">Healer</option>
                            <option value="DPS">DPS</option>
                            <option value="Cửu Kiếm">Cửu Kiếm</option>
                            <option value="Vô Danh">Vô Danh</option>
                            <option value="Dù Quạt DPS">Dù Quạt DPS</option>
                            <option value="Song Đao">Song Đao</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gwPowerLevel">Power Level</label>
                        <input type="number" id="gwPowerLevel" required min="0" step="1" value="0">
                    </div>

                    <div class="form-group form-group-full">
                        <label>Participation</label>
                        <div class="gw-option-grid">
                            <label><input type="checkbox" id="gwIsBackup"> Backup</label>
                            <label><input type="checkbox" id="gwCanSub"> Can sub last minute</label>
                        </div>
                    </div>

                    <div class="form-group form-group-full">
                        <label>Weekend Availability</label>
                        <div class="gw-option-grid" id="gwAvailabilityOptions">
                            <label><input type="radio" name="gwAvailability" value="saturday"> Can attend Saturday</label>
                            <label><input type="radio" name="gwAvailability" value="sunday"> Can attend Sunday</label>
                            <label><input type="radio" name="gwAvailability" value="both" checked> Can attend both</label>
                            <label><input type="radio" name="gwAvailability" value="none"> Can attend none</label>
                        </div>
                    </div>

                    <div class="form-actions form-group-full">
                        <button type="submit" class="btn-primary" id="gwSubmitRegistrationBtn">Submit Registration</button>
                    </div>
                </form>
                <div id="gwMemberStatus" class="import-status" aria-live="polite"></div>
            </section>
        </div>
    </div>

    <script src="guildwar.config.js"></script>
    <script src="guildwar.js"></script>
</body>
</html>
